<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Moderation — The Great Outdoors</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="admin-wrap">
  <div id="site-header"></div>

  <main>
    <div class="admin-head">
      <div class="inner" style="display:block">
        <a class="back" href="admin.html"><span id="ic-arrow" aria-hidden="true"></span> Back to Dashboard</a>
        <h1>Review Moderation</h1>
        <p>Most recent reviews across all trails — delete any that violate guidelines.</p>
      </div>
    </div>

    <div class="admin-main">
      <div class="mb-2" style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap">
        <p style="font-size:0.875rem;color:var(--slate);margin:0">
          <span id="review-count">0</span> reviews total · sorted newest first
        </p>
        <div style="display:flex;gap:0.5rem;align-items:center">
          <label for="filter-select" style="font-size:0.875rem;color:var(--slate)">Filter:</label>
          <select id="filter-select" style="padding:0.375rem 0.5rem;border:1px solid var(--cream-border);border-radius:var(--radius)">
            <option value="all">All reviews</option>
            <option value="user">User-submitted only</option>
            <option value="baked">Existing only</option>
          </select>
        </div>
      </div>

      <div id="reviews-host"></div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/trails.js"></script>
  <script src="js/common.js"></script>
  <script src="js/admin-reviews.js"></script>
</body>
</html>
